    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS-Terminal OS - Ubuntu 24.04 Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        theme: {
          extend: {
